<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡密管理后台 - 学习通AI答题助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: #0f0f1a; color: #e0e0f0; min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* 登录 */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 20px;
    }
    .login-box {
      background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
      padding: 40px; width: 380px; text-align: center;
    }
    .login-box h1 { color: #89b4fa; margin-bottom: 8px; font-size: 22px; }
    .login-box p { color: #6c7086; font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #313244;
      border-radius: 8px; background: #11111b; color: #cdd6f4; outline: none; margin-bottom: 16px;
    }
    .login-box input:focus { border-color: #89b4fa; }
    .login-box button {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; background: #89b4fa; color: #11111b; transition: 0.2s;
    }
    .login-box button:hover { background: #74c7ec; }

    /* 后台 */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid #2a2a4a; margin-bottom: 24px;
    }
    .header h1 { color: #89b4fa; font-size: 20px; }
    .header .logout {
      padding: 6px 16px; border: 1px solid #f38ba8; border-radius: 8px;
      background: transparent; color: #f38ba8; cursor: pointer; font-size: 13px; transition: 0.2s;
    }
    .header .logout:hover { background: #f38ba8; color: #11111b; }

    /* 统计卡片 */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .stat-card .stat-value { font-size: 32px; font-weight: 700; color: #89b4fa; }
    .stat-card .stat-label { font-size: 12px; color: #6c7086; margin-top: 4px; }
    .stat-card.green .stat-value { color: #a6e3a1; }
    .stat-card.yellow .stat-value { color: #f9e2af; }
    .stat-card.red .stat-value { color: #f38ba8; }

    /* 面板 */
    .panel {
      background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
    }
    .panel-title {
      font-size: 14px; color: #a6adc8; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    .panel-title::before {
      content: ''; display: inline-block; width: 3px; height: 16px;
      background: #89b4fa; border-radius: 2px;
    }

    /* 生成卡密 */
    .gen-form { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .gen-form .field { display: flex; flex-direction: column; gap: 4px; }
    .gen-form label { font-size: 12px; color: #6c7086; }
    .gen-form input {
      padding: 8px 12px; font-size: 13px; border: 1px solid #313244; border-radius: 8px;
      background: #11111b; color: #cdd6f4; outline: none; width: 120px;
    }
    .gen-form input:focus { border-color: #89b4fa; }
    .gen-form button {
      padding: 8px 24px; font-size: 14px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; background: #89b4fa; color: #11111b; transition: 0.2s;
    }
    .gen-form button:hover { background: #74c7ec; }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 10px 12px; border-bottom: 2px solid #2a2a4a;
      color: #a6adc8; font-weight: 600; white-space: nowrap;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #2a2a4a; color: #cdd6f4; }
    tr:hover td { background: #1e1e32; }
    .token-cell { font-family: monospace; font-size: 12px; color: #89b4fa; cursor: pointer; }
    .token-cell:hover { text-decoration: underline; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    }
    .badge.active { background: rgba(166,227,161,0.15); color: #a6e3a1; }
    .badge.exhausted { background: rgba(243,139,168,0.15); color: #f38ba8; }
    .btn-small {
      padding: 4px 12px; font-size: 12px; border: 1px solid #313244; border-radius: 6px;
      background: transparent; color: #cdd6f4; cursor: pointer; transition: 0.15s;
    }
    .btn-small:hover { background: #313244; }
    .btn-small.danger { border-color: #f38ba8; color: #f38ba8; }
    .btn-small.danger:hover { background: #f38ba8; color: #11111b; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; padding: 12px 24px; border-radius: 10px; font-size: 14px;
      font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #a6e3a1; color: #11111b; }
    .toast.error { background: #f38ba8; color: #11111b; }
    .toast.info { background: #89b4fa; color: #11111b; }

    /* 日志弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9998;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
      padding: 24px; width: 600px; max-height: 70vh; overflow-y: auto;
    }
    .modal-box h2 { color: #89b4fa; margin-bottom: 16px; font-size: 18px; }
    .modal-box .close-btn {
      float: right; padding: 4px 12px; border: 1px solid #313244; border-radius: 6px;
      background: transparent; color: #cdd6f4; cursor: pointer; font-size: 13px;
    }
    .modal-box .close-btn:hover { background: #313244; }
    .log-item {
      padding: 8px 12px; border-bottom: 1px solid #2a2a4a; font-size: 12px;
    }
    .log-item .log-q { color: #a6adc8; }
    .log-item .log-a { color: #a6e3a1; margin-top: 2px; }
    .log-item .log-t { color: #6c7086; font-size: 11px; margin-top: 2px; }

    .empty { text-align: center; padding: 40px; color: #6c7086; font-size: 14px; }
    .api-url-box {
      background: #11111b; border: 1px dashed #313244; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #a6adc8;
    }
    .api-url-box code { color: #89b4fa; font-family: monospace; }
  </style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>🔑 卡密管理后台</h1>
    <p>学习通 AI 答题助手 - 商业化管理系统</p>
    <input type="password" id="adminPwd" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 后台页面 -->
<div class="container" id="adminPage" style="display:none">
  <div class="header">
    <h1>🔑 卡密管理后台</h1>
    <button class="logout" onclick="logout()">退出登录</button>
  </div>

  <!-- API 地址提示 -->
  <div class="api-url-box" id="apiUrlBox">
    API 地址: <code id="apiUrlText">加载中...</code>
    <span style="margin-left:12px">管理 API: <code id="adminApiUrl">加载中...</code></span>
  </div>

  <!-- 统计 -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">总卡密数</div></div>
    <div class="stat-card green"><div class="stat-value" id="stat-active">-</div><div class="stat-label">活跃卡密</div></div>
    <div class="stat-card yellow"><div class="stat-value" id="stat-used">-</div><div class="stat-label">已使用次数</div></div>
    <div class="stat-card red"><div class="stat-value" id="stat-balance">-</div><div class="stat-label">剩余总额度</div></div>
  </div>

  <!-- 生成卡密 -->
  <div class="panel">
    <div class="panel-title">🎫 生成卡密</div>
    <div class="gen-form">
      <div class="field">
        <label>每张额度（题数）</label>
        <input type="number" id="genCount" value="100" min="1" max="10000">
      </div>
      <div class="field">
        <label>生成数量</label>
        <input type="number" id="genQuantity" value="1" min="1" max="100">
      </div>
      <div class="field">
        <label>备注（可选）</label>
        <input type="text" id="genNote" placeholder="如：淘宝订单123" style="width:200px">
      </div>
      <button onclick="generateTokens()">生成</button>
    </div>
    <div id="genResult" style="margin-top:12px;display:none">
      <div style="font-size:12px;color:#a6adc8;margin-bottom:6px">新卡密（点击复制）：</div>
      <div id="genResultList"></div>
    </div>
  </div>

  <!-- 卡密列表 -->
  <div class="panel">
    <div class="panel-title">📋 卡密列表</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>卡密</th>
            <th>额度</th>
            <th>已用</th>
            <th>剩余</th>
            <th>备注</th>
            <th>创建时间</th>
            <th>最后使用</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tokenTableBody">
          <tr><td colspan="9" class="empty">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 日志弹窗 -->
<div class="modal-overlay" id="logsModal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeLogs()">关闭</button>
    <h2>📊 使用日志 - <span id="logsToken" style="font-family:monospace;font-size:14px"></span></h2>
    <div id="logsContent">
      <div class="empty">加载中...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var API_BASE = window.location.origin;
var ADMIN_TOKEN = sessionStorage.getItem('cx_admin_token') || '';

// 自动填充 API 地址
document.getElementById('apiUrlText').textContent = API_BASE + '/api/answer';
document.getElementById('adminApiUrl').textContent = API_BASE + '/api/admin';

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function apiCall(action, method, body) {
  return fetch(API_BASE + '/api/admin?action=' + action, {
    method: method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + ADMIN_TOKEN,
    },
    body: body ? JSON.stringify(body) : undefined,
  }).then(function(r) { return r.json(); });
}

function doLogin() {
  var pwd = document.getElementById('adminPwd').value.trim();
  if (!pwd) { showToast('请输入密码', 'error'); return; }
  ADMIN_TOKEN = pwd;
  sessionStorage.setItem('cx_admin_token', pwd);
  // 测试登录
  apiCall('stats', 'GET').then(function(data) {
    if (data.error) {
      showToast('密码错误', 'error');
      ADMIN_TOKEN = '';
      sessionStorage.removeItem('cx_admin_token');
      return;
    }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    showToast('登录成功', 'success');
    loadAll();
  }).catch(function() {
    showToast('连接失败，请检查网络', 'error');
  });
}

function logout() {
  ADMIN_TOKEN = '';
  sessionStorage.removeItem('cx_admin_token');
  location.reload();
}

function loadAll() {
  loadStats();
  loadTokens();
}

function loadStats() {
  apiCall('stats', 'GET').then(function(data) {
    if (data.error) { showToast(data.error, 'error'); return; }
    document.getElementById('stat-total').textContent = data.totalTokens || 0;
    document.getElementById('stat-active').textContent = data.activeTokens || 0;
    document.getElementById('stat-used').textContent = data.totalUsed || 0;
    document.getElementById('stat-balance').textContent = data.totalBalance || 0;
  });
}

function loadTokens() {
  apiCall('list', 'GET').then(function(data) {
    if (data.error) { showToast(data.error, 'error'); return; }
    var tbody = document.getElementById('tokenTableBody');
    if (!data.tokens || data.tokens.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无卡密，点击上方"生成"创建</td></tr>';
      return;
    }
    var html = '';
    data.tokens.forEach(function(t) {
      var isActive = t.balance > 0;
      var created = t.created ? new Date(t.created).toLocaleString('zh-CN') : '-';
      var lastUsed = t.lastUsed ? new Date(t.lastUsed).toLocaleString('zh-CN') : '未使用';
      html += '<tr>' +
        '<td class="token-cell" onclick="copyText(\'' + t.token + '\')">' + t.token + '</td>' +
        '<td>' + (t.total || 0) + '</td>' +
        '<td>' + (t.used || 0) + '</td>' +
        '<td style="font-weight:600;color:' + (isActive ? '#a6e3a1' : '#f38ba8') + '">' + (t.balance || 0) + '</td>' +
        '<td>' + (t.note || '-') + '</td>' +
        '<td>' + created + '</td>' +
        '<td>' + lastUsed + '</td>' +
        '<td><span class="badge ' + (isActive ? 'active' : 'exhausted') + '">' + (isActive ? '可用' : '已用完') + '</span></td>' +
        '<td>' +
          '<button class="btn-small" onclick="showLogs(\'' + t.token + '\')">日志</button> ' +
          '<button class="btn-small danger" onclick="revokeToken(\'' + t.token + '\')">删除</button>' +
        '</td>' +
        '</tr>';
    });
    tbody.innerHTML = html;
  });
}

function generateTokens() {
  var count = parseInt(document.getElementById('genCount').value, 10);
  var quantity = parseInt(document.getElementById('genQuantity').value, 10);
  var note = document.getElementById('genNote').value.trim();

  if (!count || count < 1) { showToast('额度必须大于0', 'error'); return; }
  if (!quantity || quantity < 1) { showToast('数量必须大于0', 'error'); return; }

  apiCall('generate', 'POST', { count: count, quantity: quantity, note: note }).then(function(data) {
    if (data.error) { showToast(data.error, 'error'); return; }
    showToast('成功生成 ' + data.tokens.length + ' 张卡密', 'success');

    // 显示生成结果
    var resultDiv = document.getElementById('genResult');
    var listDiv = document.getElementById('genResultList');
    var html = '';
    data.tokens.forEach(function(t) {
      html += '<div style="padding:6px 12px;background:#11111b;border-radius:6px;margin-bottom:4px;cursor:pointer;font-family:monospace;font-size:13px;color:#89b4fa" onclick="copyText(\'' + t.token + '\')">' +
        t.token + ' <span style="color:#6c7086;font-size:11px">(' + t.balance + '题) 点击复制</span></div>';
    });
    listDiv.innerHTML = html;
    resultDiv.style.display = 'block';

    // 刷新列表
    loadStats();
    loadTokens();
  });
}

function revokeToken(token) {
  if (!confirm('确认删除卡密 ' + token + '？此操作不可恢复！')) return;
  apiCall('revoke', 'POST', { token: token }).then(function(data) {
    if (data.error) { showToast(data.error, 'error'); return; }
    showToast('已删除', 'success');
    loadStats();
    loadTokens();
  });
}

function showLogs(token) {
  document.getElementById('logsToken').textContent = token;
  document.getElementById('logsModal').classList.add('show');
  document.getElementById('logsContent').innerHTML = '<div class="empty">加载中...</div>';

  apiCall('logs&token=' + encodeURIComponent(token), 'GET').then(function(data) {
    if (data.error) { showToast(data.error, 'error'); return; }
    if (!data.logs || data.logs.length === 0) {
      document.getElementById('logsContent').innerHTML = '<div class="empty">暂无使用记录</div>';
      return;
    }
    var html = '';
    data.logs.forEach(function(log) {
      var time = log.t ? new Date(log.t).toLocaleString('zh-CN') : '-';
      html += '<div class="log-item">' +
        '<div class="log-q">问: ' + (log.q || '(空)') + '</div>' +
        '<div class="log-a">答: ' + (log.a || '(空)') + '</div>' +
        '<div class="log-t">' + time + '</div>' +
        '</div>';
    });
    document.getElementById('logsContent').innerHTML = html;
  });
}

function closeLogs() {
  document.getElementById('logsModal').classList.remove('show');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function() {
    showToast('已复制: ' + text, 'success');
  }).catch(function() {
    // 降级
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制: ' + text, 'success');
  });
}

// 自动登录检查
if (ADMIN_TOKEN) {
  apiCall('stats', 'GET').then(function(data) {
    if (!data.error) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      loadAll();
    }
  });
}
</script>
</body>
</html>
